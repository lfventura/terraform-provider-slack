name: Issue triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  markIssuesForTriage:
    runs-on: ubuntu-latest
    if: github.actor != 'lfventura'
    steps:
      - name: Apply needs-triage label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue edit "$ISSUE_URL" --add-label needs-triage
